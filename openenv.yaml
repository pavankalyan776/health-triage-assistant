name: health_triage_assistant
version: "1.0.0"
description: "A real-world healthcare triage environment for AI agent training."
tasks:
  - id: "prioritize_urgent_cases"
    difficulty: "easy"
    description: "The agent must identify if the patient record requires urgent care."
  - id: "extract_patient_vitals"
    difficulty: "medium"
    description: "The agent must extract specific numerical vitals (Temp/BP) from raw text."
  - id: "suggest_specialist_referral"
    difficulty: "hard"
    description: "The agent must recommend the correct department based on symptoms."